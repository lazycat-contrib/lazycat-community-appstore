name: Build and publish LazyCat LPK

on:
  push:
    tags:
      - client-v*
      - server-v*

permissions:
  contents: write

concurrency:
  group: lazycat-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ startsWith(github.ref_name, 'client-') && 'Client' || 'Server' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve component and version
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "${RELEASE_TAG}" in
            client-v*)
              component=client
              version="${RELEASE_TAG#client-v}"
              config=.github/lazycat-client.yml
              package_file=lazycat/client/package.yml
              release_title="MiaoMiao Client v${version}"
              ;;
            server-v*)
              component=server
              version="${RELEASE_TAG#server-v}"
              config=.github/lazycat-server.yml
              package_file=lazycat/server/package.yml
              release_title="MiaoMiao Server v${version}"
              ;;
            *)
              echo "Unsupported release tag: ${RELEASE_TAG}" >&2
              exit 1
              ;;
          esac

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag ${RELEASE_TAG} does not contain a valid SemVer" >&2
            exit 1
          fi

          package_version="$(awk '/^version:/ { print $2; exit }' "${package_file}")"
          if [[ "${package_version}" != "${version}" ]]; then
            echo "Tag version ${version} does not match ${package_file} version ${package_version}" >&2
            exit 1
          fi

          {
            echo "component=${component}"
            echo "version=${version}"
            echo "config=${config}"
            echo "package-file=${package_file}"
            echo "release-title=${release_title}"
            echo "changelog=Release ${component} v${version}"
          } >>"${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Determine source date
        id: source-date
        shell: bash
        run: echo "epoch=$(git show -s --format=%ct HEAD)" >>"${GITHUB_OUTPUT}"

      - name: Build and verify LPK
        id: build
        uses: ca-x/lazycat-github-action@v1
        env:
          LAZYCAT_WORKFLOW_TOOLCHAINS: go,node
          LAZYCAT_WORKFLOW_GO_VERSION: 1.26.4
          LAZYCAT_WORKFLOW_NODE_VERSION: 24
          SOURCE_DATE_EPOCH: ${{ steps.source-date.outputs.epoch }}
        with:
          operation: build
          config: ${{ steps.release.outputs.config }}
          version: ${{ steps.release.outputs.version }}

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.component }}-lpk-v${{ steps.release.outputs.version }}
          path: ${{ steps.build.outputs.lpk-path }}
          if-no-files-found: error

      - name: Prepare versioned Release asset
        id: asset
        shell: bash
        env:
          LPK_PATH: ${{ steps.build.outputs.lpk-path }}
          PACKAGE_ID: ${{ steps.build.outputs.package-id }}
          VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_SHA256: ${{ steps.build.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [[ ! "${PACKAGE_ID}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            echo "Unsafe package ID: ${PACKAGE_ID}" >&2
            exit 1
          fi
          if [[ ! -f "${LPK_PATH}" || ! "${EXPECTED_SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "A verified LPK path and SHA256 are required" >&2
            exit 1
          fi

          directory="${GITHUB_WORKSPACE}/.lazycat-action/release-assets"
          asset_name="${PACKAGE_ID}-v${VERSION}.lpk"
          asset_path="${directory}/${asset_name}"
          mkdir -p -- "${directory}"
          cp -- "${LPK_PATH}" "${asset_path}"
          actual_sha256="$(sha256sum "${asset_path}" | cut -d' ' -f1)"
          if [[ "${actual_sha256}" != "${EXPECTED_SHA256}" ]]; then
            echo "Copied Release asset SHA256 does not match the verified build" >&2
            exit 1
          fi

          {
            echo "name=${asset_name}"
            echo "path=${asset_path}"
          } >>"${GITHUB_OUTPUT}"

      - name: Inspect existing Release asset
        id: existing-asset
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          ASSET_NAME: ${{ steps.asset.outputs.name }}
          LPK_SHA256: ${{ steps.build.outputs.sha256 }}
        with:
          script: |
            try {
              const release = await github.rest.repos.getReleaseByTag({...context.repo, tag: process.env.RELEASE_TAG});
              const asset = release.data.assets.find(item => item.name === process.env.ASSET_NAME);
              if (!asset) {
                core.setOutput('skip-upload', 'false');
                return;
              }
              const expected = `sha256:${process.env.LPK_SHA256}`;
              if (!asset.digest) {
                core.setFailed(`Existing asset ${asset.name} has no digest and cannot be safely reused`);
                return;
              }
              if (asset.digest !== expected) {
                core.setFailed(`Existing asset ${asset.name} has digest ${asset.digest}, expected ${expected}`);
                return;
              }
              core.setOutput('skip-upload', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('skip-upload', 'false');
                return;
              }
              throw error;
            }

      - name: Create Release and upload asset
        if: steps.existing-asset.outputs.skip-upload != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release.outputs.release-title }}
          body: ${{ steps.release.outputs.changelog }}
          files: ${{ steps.asset.outputs.path }}
          fail_on_unmatched_files: true

      - name: Resolve verified Release asset
        id: release-asset
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          ASSET_NAME: ${{ steps.asset.outputs.name }}
          LPK_SHA256: ${{ steps.build.outputs.sha256 }}
        with:
          script: |
            const release = await github.rest.repos.getReleaseByTag({...context.repo, tag: process.env.RELEASE_TAG});
            const asset = release.data.assets.find(item => item.name === process.env.ASSET_NAME);
            if (!asset) {
              core.setFailed(`Release asset ${process.env.ASSET_NAME} is missing`);
              return;
            }
            const expected = `sha256:${process.env.LPK_SHA256}`;
            if (asset.digest !== expected) {
              core.setFailed(`Release asset ${asset.name} digest ${asset.digest} does not match ${expected}`);
              return;
            }
            core.setOutput('download-url', asset.browser_download_url);

      - name: Publish to MiaoMiao store
        id: publish-private
        continue-on-error: true
        uses: ca-x/lazycat-github-action@v1
        env:
          APPSTORE_URL: ${{ secrets.APPSTORE_URL }}
          APPSTORE_TOKEN: ${{ secrets.APPSTORE_TOKEN }}
          APP_ID: ${{ steps.release.outputs.component == 'client' && secrets.CLIENT_APP_ID || secrets.SERVER_APP_ID }}
          PRIVATE_STORE_GROUP_CODES: ${{ steps.release.outputs.component == 'client' && secrets.CLIENT_PRIVATE_STORE_GROUP_CODES || secrets.SERVER_PRIVATE_STORE_GROUP_CODES }}
        with:
          operation: publish-private
          config: ${{ steps.release.outputs.config }}
          version: ${{ steps.release.outputs.version }}
          changelog: ${{ steps.release.outputs.changelog }}
          lpk-path: ${{ steps.build.outputs.lpk-path }}
          download-url: ${{ steps.release-asset.outputs.download-url }}
          sha256: ${{ steps.build.outputs.sha256 }}

      - name: Publish client to LazyCat official store
        id: publish-official
        if: ${{ !cancelled() && steps.release.outputs.component == 'client' }}
        continue-on-error: true
        uses: ca-x/lazycat-github-action@v1
        env:
          LAZYCAT_TOKEN: ${{ secrets.LAZYCAT_TOKEN }}
        with:
          operation: publish-official
          config: ${{ steps.release.outputs.config }}
          version: ${{ steps.release.outputs.version }}
          changelog: ${{ steps.release.outputs.changelog }}
          lpk-path: ${{ steps.build.outputs.lpk-path }}
          sha256: ${{ steps.build.outputs.sha256 }}

      - name: Summarize store publishing
        if: ${{ always() && !cancelled() }}
        shell: bash
        env:
          COMPONENT: ${{ steps.release.outputs.component }}
          PRIVATE_OUTCOME: ${{ steps.publish-private.outcome }}
          OFFICIAL_OUTCOME: ${{ steps.publish-official.outcome }}
        run: |
          {
            echo "## LazyCat release"
            echo
            echo "- Component: ${COMPONENT}"
            echo "- MiaoMiao store: ${PRIVATE_OUTCOME}"
            if [[ "${COMPONENT}" == "client" ]]; then
              echo "- LazyCat official store: ${OFFICIAL_OUTCOME}"
            fi
          } >>"${GITHUB_STEP_SUMMARY}"

          if [[ "${PRIVATE_OUTCOME}" == "failure" ]]; then
            echo "MiaoMiao store publication failed" >&2
            exit 1
          fi
          if [[ "${COMPONENT}" == "client" && "${OFFICIAL_OUTCOME}" == "failure" ]]; then
            echo "::warning::LazyCat official publication failed; MiaoMiao store result was preserved."
          fi
