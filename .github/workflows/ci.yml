name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Race
        run: go test -race ./...
      - name: Verify tidy
        run: go mod tidy -diff
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m

  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        working-directory: client
        run: npm ci
      - name: Audit
        working-directory: client
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org
      - name: Build
        working-directory: client
        run: npm run build

  api-contract:
    name: API Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate OpenAPI
        run: npx --yes @apidevtools/swagger-cli validate docs/openapi.yaml

  lazycat-config:
    name: LazyCat Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate LazyCat YAML
        run: |
          npx --yes js-yaml lazycat/server/package.yml
          npx --yes js-yaml lazycat/server/lzc-manifest.yml
          npx --yes js-yaml lazycat/server/lzc-deploy-params.yml
          npx --yes js-yaml lazycat/server/lzc-build.yml
          npx --yes js-yaml lazycat/client/package.yml
          npx --yes js-yaml lazycat/client/lzc-manifest.yml
          npx --yes js-yaml lazycat/client/lzc-build.yml
