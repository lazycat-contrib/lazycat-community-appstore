          type: string
          minLength: 8
        sourcePasswordEnabled:
          type: boolean
        sourcePassword:
          type: string
          description: Source feed access password when sourcePasswordEnabled is true.
        githubDownloadMirrors:
          type: string
          description: Optional Release/Code(ZIP) GitHub mirrors, one name=>url entry per line.
        githubRawMirrors:
          type: string
          description: Optional raw.githubusercontent.com mirrors, one name=>url entry per line.
        requireEmailVerify:
          type: boolean

    APIToken:
      type: object
      required: [id, user_id, name, prefix]
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        prefix:
          type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    AppStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, UNLISTED]

    VersionStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    SourceType:
      type: string
      enum: [LOCAL, WEBDAV, S3, GITHUB]

    DownloadStats:
      type: object
      required: [total, day, week, month, year]
      properties:
        total:
          type: integer
        day:
          type: integer
          description: Downloads since local midnight in the configured site time zone.
        week:
          type: integer
          description: Downloads since Monday 00:00 in the configured site time zone.
        month:
          type: integer
          description: Downloads since the first day of the month in the configured site time zone.
        year:
          type: integer
          description: Downloads since January 1 in the configured site time zone.

    PackageLatestVersion:
      type: object
      required: [packageId, latestVersion]
      properties:
        packageId:
          type: string
          description: Exact LPK package identity from package.yml.
        latestVersion:
          $ref: "#/components/schemas/Version"

    AppRating:
      type: object
      required: [score, voteCount, voted]
      properties:
        score:
          type: number
          format: double
          description: Server-computed aggregate rating derived from user votes.
        voteCount:
          type: integer
        voted:
          type: boolean
          description: Whether the current authenticated user has voted for this app.

    AppSummary:
      type: object
      required: [id, ownerId, owner, packageId, name, slug, status, allowUnreviewedUpdates, commentsEnabled, commentsAllowed, installProtected, downloadCount, downloadStats, rating, tags, visibleGroupIds, appFavorited, submitterFavorited, createdAt, updatedAt]
      properties:
        id:
          type: integer
        ownerId:
          type: integer
        owner:
          type: string
        categoryId:
          type: integer
          nullable: true
        category:
          type: string
        categoryI18n:
          $ref: "#/components/schemas/LocalizedText"
        packageId:
          type: string
          description: LPK package identity from V2 package.yml package. This is the stable install identity; slug is only the storefront route/display identifier.
        name:
          type: string
        nameI18n:
          $ref: "#/components/schemas/LocalizedText"
        slug:
          type: string
        summary:
          type: string
        summaryI18n:
          $ref: "#/components/schemas/LocalizedText"
        description:
          type: string
        descriptionI18n:
          $ref: "#/components/schemas/LocalizedText"
        author:
          type: string
          description: Software author declared by the LPK package metadata.
        homepage:
          type: string
        license:
          type: string
        minOSVersion:
          type: string
          description: Informational minimum LazyCat OS version declared by the LPK.
        iconUrl:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/AppStatus"
        allowUnreviewedUpdates:
          type: boolean
        commentsEnabled:
          type: boolean
          description: Per-app comment setting configured by the app maintainer.
        commentsAllowed:
          type: boolean
          description: Effective comment permission after applying site-wide and per-app settings.
        installProtected:
          type: boolean
          description: True when this app requires a per-app install password. The password hash is never returned.
        downloadCount:
          type: integer
          description: Backward-compatible all-time download count. Prefer downloadStats for period-aware displays.
        downloadStats:
          $ref: "#/components/schemas/DownloadStats"
        rating:
          $ref: "#/components/schemas/AppRating"
        tags:
          type: array
          items:
            type: string
        visibleGroupIds:
          type: array
          items:
            type: integer
        appFavorited:
          type: boolean
          description: Whether the current authenticated user has favorited this app.
        submitterFavorited:
          type: boolean
          description: Whether the current authenticated user has favorited this app submitter.
        latestVersion:
          $ref: "#/components/schemas/Version"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppDetail:
      allOf:
        - $ref: "#/components/schemas/AppSummary"
        - type: object
          properties:
            versions:
              type: array
              items:
                $ref: "#/components/schemas/Version"
            screenshots:
              type: array
              items:
                $ref: "#/components/schemas/Screenshot"
            comments:
              type: array
              items:
                $ref: "#/components/schemas/Comment"
            favorites:
              type: integer
            outdatedMarks:
              type: integer
            outdatedMarked:
              type: boolean
            canManageApp:
              type: boolean
            canUploadVersion:
              type: boolean
            canClearOutdatedMarks:
