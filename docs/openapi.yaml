          $ref: "#/components/responses/Error"

  /api/client/v1/apps/{id}/versions:
    get:
      tags: [Client]
      summary: List versions for one cached client source app
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Versions available from the synced source feed.
          content:
            application/json:
              schema:
                type: object
                required: [versions]
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientVersion"
        "404":
          $ref: "#/components/responses/Error"

  /api/client/v1/apps/{id}/outdated-marks:
