        mirror:
          type: string

    ClientVersion:
      type: object
      required: [version, downloadUrl, sha256, size]
      properties:
        version:
          type: string
        downloadUrl:
          type: string
          format: uri
        upstreamDownloadUrl:
          type: string
          format: uri
        sourceType:
          type: string
        sha256:
          type: string
        size:
