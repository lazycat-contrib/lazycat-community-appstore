        trigger:
          type: string
          enum: [API_TOKEN_FIRST_SUBMISSION, MANUAL]
        attempts:
          type: integer
          minimum: 0
        lastError:
          type: string
        updatedAt:
          type: string
          format: date-time
        completedAt:
