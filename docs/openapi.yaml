        taskId:
          type: string
        status:
          type: string
        detail:
          type: string

    InstallHistoryEntry:
      type: object
      required: [id, packageId, appName, result, createdAt]
      properties:
        id:
          type: integer
        sourceId:
          type: integer
          nullable: true
        sourceAppId:
          type: integer
          nullable: true
        sourceName:
          type: string
        packageId:
          type: string
        appName:
          type: string
        version:
          type: string
        result:
          type: string
          enum: [SUCCESS, FAILED]
        downloadUrl:
          type: string
        sha256:
          type: string
        error:
          type: string
        createdAt:
          type: string
          format: date-time

    SetupRequest:
      type: object
      required: [username, password]
      properties:
        username:
