openapi: 3.0.3
info:
  title: MiaoMiao Private Store Server API
  version: 0.1.0
  description: REST API for the self-hosted LPK app store server.
servers:
  - url: http://localhost:8080
security:
  - cookieAuth: []
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        "200":
          description: Server is healthy.

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify a registration email token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and set the session cookie
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Clear the session cookie
      responses:
        "200":
          description: Logged out.

  /api/v1/setup/status:
    get:
      tags: [Setup]
      summary: Return whether the server needs first-run setup
      security: []
      responses:
        "200":
          description: Setup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /api/v1/setup:
    post:
      tags: [Setup]
      summary: Create the first site administrator and initial site settings
      description: This endpoint is public only while no SITE_ADMIN user exists. After setup it returns 409.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "201":
          description: First site administrator created and logged in.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  setup:
                    $ref: "#/components/schemas/SetupStatus"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/site/profile:
    get:
      tags: [Site]
      summary: Public site identity and announcement profile
      security: []
      responses:
        "200":
          description: Site profile.
          content:
            application/json:
              schema:
                type: object
                required: [site]
                properties:
                  site:
                    $ref: "#/components/schemas/SiteProfile"

  /api/v1/runtime/capabilities:
    get:
      tags: [System]
      summary: Return request-scoped runtime capabilities
      description: LazyCat installation is true only when the server trusts platform headers and the request includes both LazyCat user and device context. Responses are never cacheable.
      security: []
      responses:
        "200":
          description: Runtime capabilities for this request.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: [no-store]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCapabilities"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Return the current authenticated user
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/me/tokens:
    get:
      tags: [Tokens]
      summary: List API tokens for the current user
      responses:
        "200":
          description: Token records. Raw token values are not returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIToken"
    post:
      tags: [Tokens]
      summary: Create an API token for CI/CD publishing
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Token created. The raw token is returned once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  record:
                    $ref: "#/components/schemas/APIToken"

  /api/v1/me/tokens/{id}:
    delete:
      tags: [Tokens]
      summary: Delete an API token
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Token deleted.
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/me/favorites:
    get:
      tags: [Social]
      summary: List favorited apps and submitters
      responses:
        "200":
          description: Favorites.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteData"

  /api/v1/me/apps/lpk-inspections:
    post:
      tags: [Apps]
      summary: Queue LPK metadata inspections for selected owned apps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appIds]
              properties:
                appIds:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items:
                    type: integer
                overwriteExistingMetadata:
                  type: boolean
                  default: false
      responses:
        "202":
          description: Eligible inspections queued and unavailable apps reported as skipped.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkLPKInspectionResponse"

  /api/v1/me/apps/lpk-inspections/status:
    post:
      tags: [Apps]
      summary: Read selected owned LPK inspection statuses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items:
                    type: integer
      responses:
        "200":
          description: Inspection statuses visible to the current owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkLPKInspectionResponse"

  /api/v1/packages/{packageId}/latest-version:
    get:
      tags: [Apps]
      summary: Get the latest approved version by exact package ID
      security: []
      parameters:
        - name: packageId
          in: path
          required: true
          schema:
            type: string
          description: Exact LPK package identity from package.yml.
        - name: groupCodes
          in: query
          schema:
            type: string
          description: Comma-separated group access codes.
        - name: X-Group-Codes
          in: header
          schema:
            type: string
          description: Comma-separated group access codes.
      responses:
        "200":
          description: The newest approved version visible to the current request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageLatestVersion"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/apps:
    get:
      tags: [Apps]
      summary: List visible apps
      security: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          description: Admin-only status filter.
          schema:
            $ref: "#/components/schemas/AppStatus"
        - name: submitter
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          schema:
            type: string
            enum: [recent, downloads, downloads_day, downloads_week, downloads_month, downloads_year, name]
          description: downloads is all-time; downloads_day/week/month/year use the configured site time zone.
      responses:
        "200":
          description: Apps visible to the current request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  apps:
                    type: array
                    items:
                      $ref: "#/components/schemas/AppSummary"
    post:
      tags: [Apps]
      summary: Submit an app with either an uploaded LPK or an external LPK URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateAppMultipart"
      responses:
        "201":
          description: App submitted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    $ref: "#/components/schemas/AppSummary"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/apps/by-name:
    get:
      tags: [Apps]
      summary: Resolve a writable app by its exact name
      description: Returns the single app with the exact case-sensitive name for which the authenticated user can upload versions. Unrelated public apps are ignored. Multiple writable matches return a conflict so automation cannot select an app ambiguously.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The uniquely resolved writable app.
          content:
            application/json:
              schema:
                type: object
                required: [app]
                properties:
                  app:
                    $ref: "#/components/schemas/AppSummary"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}:
    get:
      tags: [Apps]
      summary: Get app detail
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: App detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    $ref: "#/components/schemas/AppDetail"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Apps]
      summary: Update app metadata or create a review request
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppRequest"
      responses:
        "200":
          description: App updated directly.
        "202":
          description: Review request created.
        "403":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Apps]
      summary: Delete an app and associated records
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: App deleted.
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/unlist:
    post:
      tags: [Apps]
      summary: Unlist an app
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: App unlisted.

  /api/v1/apps/{id}/lpk-inspections:
    post:
      tags: [Apps]
      summary: Queue an LPK metadata inspection
      description: App owners, collaborators with version-upload access, and administrators can inspect the latest externally linked LPK. By default only missing metadata is filled; overwriting existing metadata requires explicit opt-in.
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                overwriteExistingMetadata:
                  type: boolean
                  default: false
      responses:
        "202":
          description: Inspection queued or an existing active inspection returned.
          content:
            application/json:
              schema:
                type: object
                required: [inspection]
                properties:
                  inspection:
                    $ref: "#/components/schemas/LPKInspectionStatus"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/versions:
    post:
      tags: [Versions]
      summary: Upload or link a new app version
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateVersionMultipart"
      responses:
        "201":
          description: Version created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/Version"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/version-retention:
    patch:
      tags: [Versions]
      summary: Set or inherit the approved-version retention policy for an app
      description: Only the app owner, a software administrator, or a site administrator may change this policy. Saving immediately prunes excess approved versions.
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/InheritVersionRetentionRequest"
                - $ref: "#/components/schemas/CustomVersionRetentionRequest"
      responses:
        "200":
          description: Policy saved and excess approved versions pruned.
          content:
            application/json:
              schema:
                type: object
                required: [versionRetention, prunedVersions]
                properties:
                  versionRetention:
                    $ref: "#/components/schemas/VersionRetentionPolicy"
                  prunedVersions:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeletedVersionResult"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/versions/{versionId}:
    delete:
      tags: [Versions]
      summary: Delete any app version, including the current latest version
      description: Release maintainers may delete a version. Managed storage cleanup is best effort after the database deletion commits; failures are returned as warnings and do not restore the version row.
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version deleted.
          content:
            application/json:
              schema:
                type: object
                required: [deletedVersion]
                properties:
                  deletedVersion:
                    $ref: "#/components/schemas/DeletedVersionResult"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/versions/{versionId}/download:
    get:
      tags: [Versions]
      summary: Redirect to the version LPK URL and increment download count
      description: Apps with installProtected=true require the install password as either the installPassword query parameter or X-Install-Password header.
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
        - name: installPassword
          in: query
          required: false
          schema:
            type: string
        - name: X-Install-Password
          in: header
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the LPK file.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/versions/{versionId}/install:
    post:
      tags: [Versions]
      summary: Install a storefront version on the device hosting the server
      description: Requires trusted LazyCat platform user and device headers. The server derives the LPK URL, checksum, package ID, and title from approved database records; callers cannot override them.
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LazyCatInstallRequest"
      responses:
        "200":
          description: Installation completed through the LazyCat Go SDK.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: [no-store]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LazyCatInstallResult"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/screenshots:
    post:
      tags: [Screenshots]
      summary: Upload an app screenshot
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                caption:
                  type: string
                deviceType:
                  type: string
                  enum: [DESKTOP, MOBILE]
      responses:
        "201":
          description: Screenshot uploaded.

  /api/v1/apps/{id}/screenshots/reorder:
    patch:
      tags: [Screenshots]
      summary: Reorder screenshots
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [id, sortOrder]
                    properties:
                      id:
                        type: integer
                      sortOrder:
                        type: integer
      responses:
        "200":
          description: Screenshots reordered.

  /api/v1/apps/{id}/screenshots/{screenshotId}:
    patch:
      tags: [Screenshots]
      summary: Update screenshot metadata
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: screenshotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                caption:
                  type: string
      responses:
        "200":
          description: Screenshot updated.
    delete:
      tags: [Screenshots]
      summary: Delete a screenshot
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: screenshotId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Screenshot deleted.

  /api/v1/apps/{id}/comments:
    post:
      tags: [Comments]
      summary: Create a comment or feedback entry
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        "201":
          description: Comment created.
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/comments/{id}:
    delete:
      tags: [Comments]
      summary: Delete a comment
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Comment deleted.

  /api/v1/apps/{id}/favorites:
    post:
      tags: [Social]
      summary: Toggle app favorite
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Favorite state toggled.

  /api/v1/apps/{id}/rating:
    post:
      tags: [Social]
      summary: Vote for an app and return the aggregate rating
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Existing vote refreshed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rating:
                    $ref: "#/components/schemas/AppRating"
        "201":
          description: Vote created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rating:
                    $ref: "#/components/schemas/AppRating"
    delete:
      tags: [Social]
      summary: Remove the current user's app vote and return the aggregate rating
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Vote removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rating:
                    $ref: "#/components/schemas/AppRating"

  /api/v1/submitters/{id}/favorites:
    post:
      tags: [Social]
      summary: Toggle submitter favorite
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Favorite state toggled.

  /api/v1/apps/{id}/outdated-marks:
    post:
      tags: [Social]
      summary: Request an app update by marking it outdated
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutdatedMarkRequest"
      responses:
        "200":
          description: Existing outdated mark updated.
        "201":
          description: Outdated mark created.
        "422":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Social]
      summary: Clear outdated marks
      description: Clears the current user's outdated mark. If the site setting allow_manual_outdated_clear is enabled, app submitters and admins clear all outdated marks for the app.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Outdated mark cleared.

  /api/v1/apps/{id}/collaborator-requests:
    post:
      tags: [Collaboration]
      summary: Request collaborator access for an app
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      responses:
        "201":
          description: Request created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/CollaboratorRequest"
    get:
      tags: [Collaboration]
      summary: List collaborator requests for an app
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Collaborator requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/CollaboratorRequest"

  /api/v1/collaborator-requests/{id}/approve:
    post:
      tags: [Collaboration]
      summary: Approve a collaborator request
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Request approved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/CollaboratorRequest"

  /api/v1/collaborator-requests/{id}/reject:
    post:
      tags: [Collaboration]
      summary: Reject a collaborator request
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Request rejected.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/CollaboratorRequest"

