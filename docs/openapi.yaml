          type: integer
        userId:
          type: integer
        username:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time

    OutdatedMarkRequest:
      type: object
      required: [note]
      properties:
        note:
          type: string
          minLength: 1
          maxLength: 1000
