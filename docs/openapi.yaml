openapi: 3.0.3
info:
  title: MiaoMiao Private Store Server API
  version: 0.1.0
  description: REST API for the self-hosted LPK app store server.
servers:
  - url: http://localhost:8080
security:
  - cookieAuth: []
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        "200":
          description: Server is healthy.

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify a registration email token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and set the session cookie
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Clear the session cookie
      responses:
        "200":
          description: Logged out.

  /api/v1/setup/status:
    get:
      tags: [Setup]
      summary: Return whether the server needs first-run setup
      security: []
      responses:
        "200":
          description: Setup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /api/v1/setup:
    post:
      tags: [Setup]
      summary: Create the first site administrator and initial site settings
      description: This endpoint is public only while no SITE_ADMIN user exists. After setup it returns 409.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "201":
          description: First site administrator created and logged in.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  setup:
                    $ref: "#/components/schemas/SetupStatus"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/site/profile:
    get:
      tags: [Site]
      summary: Public site identity and announcement profile
      security: []
      responses:
        "200":
          description: Site profile.
          content:
            application/json:
              schema:
                type: object
                required: [site]
                properties:
                  site:
                    $ref: "#/components/schemas/SiteProfile"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Return the current authenticated user
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/me/tokens:
    get:
      tags: [Tokens]
      summary: List API tokens for the current user
      responses:
        "200":
          description: Token records. Raw token values are not returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIToken"
    post:
      tags: [Tokens]
      summary: Create an API token for CI/CD publishing
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Token created. The raw token is returned once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  record:
                    $ref: "#/components/schemas/APIToken"

  /api/v1/me/tokens/{id}:
    delete:
      tags: [Tokens]
      summary: Delete an API token
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Token deleted.
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/me/favorites:
    get:
      tags: [Social]
      summary: List favorited apps and submitters
      responses:
        "200":
          description: Favorites.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteData"

  /api/v1/apps:
    get:
      tags: [Apps]
      summary: List visible apps
      security: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          description: Admin-only status filter.
          schema:
            $ref: "#/components/schemas/AppStatus"
        - name: submitter
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Apps visible to the current request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  apps:
                    type: array
                    items:
                      $ref: "#/components/schemas/AppSummary"
    post:
      tags: [Apps]
      summary: Submit an app with either an uploaded LPK or an external LPK URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateAppMultipart"
      responses:
        "201":
          description: App submitted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    $ref: "#/components/schemas/AppSummary"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}:
    get:
      tags: [Apps]
      summary: Get app detail
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: App detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    $ref: "#/components/schemas/AppDetail"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Apps]
      summary: Update app metadata or create a review request
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppRequest"
      responses:
        "200":
          description: App updated directly.
        "202":
          description: Review request created.
        "403":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Apps]
      summary: Delete an app and associated records
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: App deleted.
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/unlist:
    post:
      tags: [Apps]
      summary: Unlist an app
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: App unlisted.

  /api/v1/apps/{id}/versions:
    post:
      tags: [Versions]
      summary: Upload or link a new app version
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateVersionMultipart"
      responses:
        "201":
          description: Version created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/Version"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/versions/{versionId}/download:
    get:
      tags: [Versions]
      summary: Redirect to the version LPK URL and increment download count
      description: Apps with installProtected=true require the install password as either the installPassword query parameter or X-Install-Password header.
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
        - name: installPassword
          in: query
          required: false
          schema:
            type: string
        - name: X-Install-Password
          in: header
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the LPK file.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/apps/{id}/screenshots:
    post:
      tags: [Screenshots]
      summary: Upload an app screenshot
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                caption:
                  type: string
                deviceType:
                  type: string
                  enum: [DESKTOP, MOBILE]
      responses:
        "201":
          description: Screenshot uploaded.

  /api/v1/apps/{id}/screenshots/reorder:
    patch:
      tags: [Screenshots]
      summary: Reorder screenshots
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [id, sortOrder]
                    properties:
                      id:
                        type: integer
                      sortOrder:
                        type: integer
      responses:
        "200":
          description: Screenshots reordered.

  /api/v1/apps/{id}/screenshots/{screenshotId}:
    patch:
      tags: [Screenshots]
      summary: Update screenshot metadata
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: screenshotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                caption:
                  type: string
      responses:
        "200":
          description: Screenshot updated.
    delete:
      tags: [Screenshots]
      summary: Delete a screenshot
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: screenshotId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Screenshot deleted.

  /api/v1/apps/{id}/comments:
    post:
      tags: [Comments]
      summary: Create a comment or feedback entry
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        "201":
          description: Comment created.
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/comments/{id}:
    delete:
      tags: [Comments]
      summary: Delete a comment
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Comment deleted.

  /api/v1/apps/{id}/favorites:
    post:
      tags: [Social]
      summary: Toggle app favorite
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Favorite state toggled.

  /api/v1/submitters/{id}/favorites:
    post:
      tags: [Social]
      summary: Toggle submitter favorite
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Favorite state toggled.

  /api/v1/apps/{id}/outdated-marks:
    post:
      tags: [Social]
      summary: Request an app update by marking it outdated
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutdatedMarkRequest"
      responses:
        "200":
          description: Existing outdated mark updated.
        "201":
          description: Outdated mark created.
        "422":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Social]
      summary: Clear outdated marks
      description: Clears the current user's outdated mark. If the site setting allow_manual_outdated_clear is enabled, app submitters and admins clear all outdated marks for the app.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Outdated mark cleared.

  /api/v1/apps/{id}/collaborator-requests:
    post:
      tags: [Collaboration]
      summary: Request collaborator access for an app
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      responses:
        "201":
          description: Request created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/CollaboratorRequest"
    get:
      tags: [Collaboration]
      summary: List collaborator requests for an app
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Collaborator requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/CollaboratorRequest"

  /api/v1/collaborator-requests/{id}/approve:
    post:
      tags: [Collaboration]
      summary: Approve a collaborator request
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Request approved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/CollaboratorRequest"

  /api/v1/collaborator-requests/{id}/reject:
    post:
      tags: [Collaboration]
      summary: Reject a collaborator request
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Request rejected.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/CollaboratorRequest"

  /api/v1/apps/{id}/visibility:
    patch:
      tags: [Visibility]
      summary: Replace visible user group IDs for an app
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupIds]
              properties:
                groupIds:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: Visibility updated.

  /api/v1/groups:
    get:
      tags: [Groups]
      summary: List groups owned by the current user
      responses:
        "200":
          description: User groups.
    post:
      tags: [Groups]
      summary: Create a user group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Group created.

  /api/v1/groups/{id}/members/{userId}:
    post:
      tags: [Groups]
      summary: Add a member to a group
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member added.
    delete:
      tags: [Groups]
      summary: Remove a member from a group
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed.

  /api/v1/categories:
    get:
      tags: [Taxonomy]
      summary: List public categories
      security: []
      responses:
        "200":
          description: Categories.

  /api/v1/tags:
    get:
      tags: [Taxonomy]
      summary: List public tags
      security: []
      responses:
        "200":
          description: Tags.

  /api/v1/collections:
    get:
      tags: [Collections]
      summary: List public collections and their visible apps
      security: []
      responses:
        "200":
          description: Collections.

  /api/v1/admin/reviews:
    get:
      tags: [Admin]
      summary: List review requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
      responses:
        "200":
          description: Reviews.

  /api/v1/admin/reviews/{id}/approve:
    post:
      tags: [Admin]
      summary: Approve a review request
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Review approved.

  /api/v1/admin/reviews/{id}/reject:
    post:
      tags: [Admin]
      summary: Reject a review request
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Review rejected.

  /api/v1/admin/categories:
    get:
      tags: [Admin]
      summary: Admin list categories
      responses:
        "200":
          description: Categories.
    post:
      tags: [Admin]
      summary: Create a category
      requestBody:
        $ref: "#/components/requestBodies/TaxonomyBody"
      responses:
        "201":
          description: Category created.

  /api/v1/admin/categories/{id}:
    patch:
      tags: [Admin]
      summary: Update a category
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        $ref: "#/components/requestBodies/TaxonomyBody"
      responses:
        "200":
          description: Category updated.
    delete:
      tags: [Admin]
      summary: Delete a category
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Category deleted.

  /api/v1/admin/tags:
    get:
      tags: [Admin]
      summary: Admin list tags
      responses:
        "200":
          description: Tags.
    post:
      tags: [Admin]
      summary: Create a tag
      requestBody:
        $ref: "#/components/requestBodies/TaxonomyBody"
      responses:
        "201":
          description: Tag created.

  /api/v1/admin/tags/{id}:
    patch:
      tags: [Admin]
      summary: Update a tag by ID or slug
      parameters:
        - $ref: "#/components/parameters/IDOrSlug"
      requestBody:
        $ref: "#/components/requestBodies/TaxonomyBody"
      responses:
        "200":
          description: Tag updated.
    delete:
      tags: [Admin]
      summary: Delete a tag by ID or slug
      parameters:
        - $ref: "#/components/parameters/IDOrSlug"
      responses:
        "200":
          description: Tag deleted.

  /api/v1/admin/collections:
    get:
      tags: [Admin]
      summary: Admin list collections
      responses:
        "200":
          description: Collections.
    post:
      tags: [Admin]
      summary: Create a collection
      requestBody:
        $ref: "#/components/requestBodies/CollectionBody"
      responses:
        "201":
          description: Collection created.

  /api/v1/admin/collections/{id}:
    patch:
      tags: [Admin]
      summary: Update a collection
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        $ref: "#/components/requestBodies/CollectionBody"
      responses:
        "200":
          description: Collection updated.
    delete:
      tags: [Admin]
      summary: Delete a collection
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Collection deleted.

  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: Site admin list users
      responses:
        "200":
          description: Users.

  /api/v1/admin/users/{id}:
    patch:
      tags: [Admin]
      summary: Site admin update user role or email verification state
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: "#/components/schemas/UserRole"
                emailVerified:
                  type: boolean
      responses:
        "200":
          description: User updated.

  /api/v1/admin/settings:
    get:
      tags: [Admin]
      summary: Site admin list settings
      responses:
        "200":
          description: Site settings.
          content:
            application/json:
              schema:
                type: object
                required: [settings]
                properties:
                  settings:
                    $ref: "#/components/schemas/SiteSettings"
    patch:
      tags: [Admin]
      summary: Site admin update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Settings updated.
          content:
            application/json:
              schema:
                type: object
                required: [settings]
                properties:
                  settings:
                    $ref: "#/components/schemas/SiteSettings"

  /api/v1/admin/registration-invites:
    get:
      tags: [Admin]
      summary: Site admin list registration invites
      responses:
        "200":
          description: Registration invites.
          content:
            application/json:
              schema:
                type: object
                required: [invites]
                properties:
                  invites:
                    type: array
                    items:
                      $ref: "#/components/schemas/RegistrationInvite"
    post:
      tags: [Admin]
      summary: Site admin create a registration invite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegistrationInviteRequest"
      responses:
        "201":
          description: Registration invite created. The full code is returned only in this response.
          content:
            application/json:
              schema:
                type: object
                required: [invite, code]
                properties:
                  invite:
                    $ref: "#/components/schemas/RegistrationInvite"
                  code:
                    type: string
        "422":
          $ref: "#/components/responses/Error"

  /api/v1/admin/registration-invites/{id}:
    delete:
      tags: [Admin]
      summary: Site admin delete a registration invite
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invite deleted.
        "404":
          $ref: "#/components/responses/Error"

  /api/client/v1/sources:
    get:
      tags: [Client]
      summary: List software sources stored by the standalone client
      description: Client endpoints use the optional x-hc-user-id header supplied by the app runtime. When it is absent, data is scoped to the local user.
      security: []
      responses:
        "200":
          description: Source subscriptions.
          content:
            application/json:
              schema:
                type: object
                required: [sources]
                properties:
                  sources:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientSource"
    post:
      tags: [Client]
      summary: Add a software source to the standalone client
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientSourceInput"
      responses:
        "201":
          description: Source created.
          content:
            application/json:
              schema:
                type: object
                required: [source]
                properties:
                  source:
                    $ref: "#/components/schemas/ClientSource"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/client/v1/sources/{id}:
    patch:
      tags: [Client]
      summary: Update a standalone client source
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientSourceInput"
      responses:
        "200":
          description: Source updated.
          content:
            application/json:
              schema:
                type: object
                required: [source]
                properties:
                  source:
                    $ref: "#/components/schemas/ClientSource"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Client]
      summary: Delete a standalone client source and its cached apps
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Source deleted.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"

  /api/client/v1/sources/{id}/sync:
    post:
      tags: [Client]
      summary: Sync one standalone client source
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Source sync result.
          content:
            application/json:
              schema:
                type: object
                required: [source]
                properties:
                  source:
                    $ref: "#/components/schemas/ClientSource"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /api/client/v1/sources/sync:
    post:
      tags: [Client]
      summary: Sync all standalone client sources
      security: []
      responses:
        "200":
          description: Sync counts.
          content:
            application/json:
              schema:
                type: object
                required: [result]
                properties:
                  result:
                    $ref: "#/components/schemas/ClientSyncAllResult"

  /api/client/v1/apps:
    get:
      tags: [Client]
      summary: List cached apps from synced client sources
      security: []
      parameters:
        - name: sourceId
          in: query
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Cached source apps.
          content:
            application/json:
              schema:
                type: object
                required: [apps]
                properties:
                  apps:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientSourceApp"

  /api/client/v1/apps/{id}:
    get:
      tags: [Client]
      summary: Get one cached client source app
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Cached source app.
          content:
            application/json:
              schema:
                type: object
                required: [app]
                properties:
                  app:
                    $ref: "#/components/schemas/ClientSourceApp"
        "404":
          $ref: "#/components/responses/Error"

  /api/client/v1/apps/{id}/versions:
    get:
      tags: [Client]
      summary: List versions for one cached client source app
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Versions available from the synced source feed.
          content:
            application/json:
              schema:
                type: object
                required: [versions]
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientVersion"
        "404":
          $ref: "#/components/responses/Error"

  /api/client/v1/apps/{id}/outdated-marks:
    post:
      tags: [Client]
      summary: Proxy a client update request to the app source server
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutdatedMarkRequest"
      responses:
        "200":
          description: Existing outdated mark updated by the source server.
        "201":
          description: Outdated mark created by the source server.
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Client]
      summary: Proxy clearing the current client's outdated mark to the source server
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Outdated mark cleared by the source server.
        "403":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /api/client/v1/installed:
    get:
      tags: [Client]
      summary: Query apps installed on the current app device
      description: This endpoint is local to the standalone client. The server storefront never receives or stores this device inventory.
      security: []
      responses:
        "200":
          description: Installed applications.
          content:
            application/json:
              schema:
                type: object
                required: [apps]
                properties:
                  apps:
                    type: array
                    items:
                      $ref: "#/components/schemas/InstalledApplication"
        "502":
          $ref: "#/components/responses/Error"

  /api/client/v1/install:
    post:
      tags: [Client]
      summary: Install a cached source app through the system Go SDK
      description: If version is omitted, the latest source version is installed. Supplying version lets the client install an older synced version for rollback.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInstallRequest"
      responses:
        "200":
          description: Install task result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientInstallResult"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /api/client/v1/history:
    get:
      tags: [Client]
      summary: List install attempts recorded by the standalone client
      security: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Install history entries.
          content:
            application/json:
              schema:
                type: object
                required: [history]
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/InstallHistoryEntry"
        "400":
          $ref: "#/components/responses/Error"

  /source/v1/index.json:
    get:
      tags: [Source]
      summary: Public software source feed
      security: []
      parameters:
        - name: password
          in: query
          required: false
          schema:
            type: string
        - name: X-Source-Password
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Source index with public approved apps and site metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceIndex"
        "401":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: lazycat_store_session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
    IDOrSlug:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    Error:
      description: Structured API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  requestBodies:
    TaxonomyBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
              slug:
                type: string
              description:
                type: string
              parentId:
                type: integer
                nullable: true
              sortOrder:
                type: integer
    CollectionBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
              slug:
                type: string
              description:
                type: string
              kind:
                type: string
                enum: [MANUAL, RECENT_UPDATED, MOST_DOWNLOADED]
              appIds:
                type: array
                items:
                  type: integer

  schemas:
    LocalizedText:
      type: object
      additionalProperties:
        type: string
      description: Locale keyed text map, for example zh, zh-CN, zh_Hans, or en.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
            details:
              nullable: true

    UserRole:
      type: string
      enum: [USER, SOFTWARE_ADMIN, SITE_ADMIN]

    User:
      type: object
      required: [id, username, role, emailVerified, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        inviteCode:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    SetupStatus:
      type: object
      required: [needsSetup]
      properties:
        needsSetup:
          type: boolean

    SiteAnnouncement:
      type: object
      required: [enabled, level]
      properties:
        enabled:
          type: boolean
        level:
          type: string
          enum: [info, warning, success]
        title:
          type: string
        body:
          type: string
        linkLabel:
          type: string
        linkUrl:
          type: string
          format: uri
        updatedAt:
          type: string
          format: date-time

    SiteRegistration:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [open, invite, closed]

    SiteProfile:
      type: object
      required: [title, publicUrl, sourceUrl, announcement, registration]
      properties:
        title:
          type: string
        iconUrl:
          type: string
          format: uri
        publicUrl:
          type: string
          format: uri
        sourceUrl:
          type: string
          format: uri
        announcement:
          $ref: "#/components/schemas/SiteAnnouncement"
        registration:
          $ref: "#/components/schemas/SiteRegistration"

    SiteSettings:
      type: object
      additionalProperties:
        type: string
      description: Site admin settings keyed by server setting names such as site_title, site_public_url, registration_mode, comments_enabled, allow_manual_outdated_clear, source_password, github_download_mirrors, github_raw_mirrors, announcement_enabled, and max_lpk_size.

    CreateRegistrationInviteRequest:
      type: object
      properties:
        note:
          type: string
          maxLength: 160
        maxUses:
          type: integer
          minimum: 1
          maximum: 10000
          default: 1

    RegistrationInvite:
      type: object
      required: [id, codePrefix, note, maxUses, remainingUses, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: integer
        codePrefix:
          type: string
        note:
          type: string
        maxUses:
          type: integer
        remainingUses:
          type: integer
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SourceIndex:
      type: object
      required: [schema, baseUrl, generatedAt, site, announcement, apps]
      properties:
        schema:
          type: string
          example: lazycat.appstore.source.v1
        baseUrl:
          type: string
          format: uri
        generatedAt:
          type: string
          format: date-time
        site:
          $ref: "#/components/schemas/SourceSite"
        announcement:
          $ref: "#/components/schemas/SiteAnnouncement"
        apps:
          type: array
          items:
            $ref: "#/components/schemas/SourceApp"

    SourceApp:
      type: object
      required: [id, packageId, name, slug, summary, description, installProtected, commentsEnabled, updatedAt, latestVersion, versions]
      properties:
        id:
          type: integer
        packageId:
          type: string
          description: LPK package identity from V2 package.yml package.
        name:
          type: string
        nameI18n:
          $ref: "#/components/schemas/LocalizedText"
        slug:
          type: string
        summary:
          type: string
        summaryI18n:
          $ref: "#/components/schemas/LocalizedText"
        description:
          type: string
        descriptionI18n:
          $ref: "#/components/schemas/LocalizedText"
        iconUrl:
          type: string
          format: uri
        category:
          type: string
        categoryI18n:
          $ref: "#/components/schemas/LocalizedText"
        tags:
          type: array
          items:
            type: string
        submitter:
          type: string
        installProtected:
          type: boolean
        commentsEnabled:
          type: boolean
          description: Effective source comment permission after applying site-wide and per-app comment settings.
        outdatedMarks:
          type: integer
          description: Number of client update requests currently open for this app. Publishing a new version clears the count.
        updatedAt:
          type: string
          format: date-time
        latestVersion:
          $ref: "#/components/schemas/SourceVersion"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/SourceVersion"

    SourceSite:
      type: object
      required: [title, publicUrl, sourceUrl]
      properties:
        title:
          type: string
        iconUrl:
          type: string
          format: uri
        publicUrl:
          type: string
          format: uri
        sourceUrl:
          type: string
          format: uri

    SourceVersion:
      type: object
      required: [version, downloadUrl, sha256, size, publishedAt]
      properties:
        version:
          type: string
        changelog:
          type: string
        sourceType:
          type: string
        downloadUrl:
          type: string
          format: uri
        upstreamDownloadUrl:
          type: string
          format: uri
        sha256:
          type: string
        size:
          type: integer
          format: int64
        publishedAt:
          type: string
          format: date-time

    ClientSource:
      type: object
      required: [id, name, url, password, mirror, lastAppCount, lastInstallableCount]
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
          format: uri
        password:
          type: string
          description: Source feed password stored locally by the standalone client.
        mirror:
          type: string
          description: Optional mirror prefix used by the client for GitHub download URLs.
        lastSync:
          type: string
          format: date-time
        lastError:
          type: string
        lastErrorCode:
          type: string
        lastAppCount:
          type: integer
        lastInstallableCount:
          type: integer

    ClientSourceInput:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        password:
          type: string
        mirror:
          type: string

    ClientVersion:
      type: object
      required: [version, downloadUrl, sha256, size]
      properties:
        version:
          type: string
        downloadUrl:
          type: string
          format: uri
        upstreamDownloadUrl:
          type: string
          format: uri
        sourceType:
          type: string
        sha256:
          type: string
        size:
          type: integer
          format: int64

    ClientSourceApp:
      type: object
      required: [id, sourceId, sourceName, packageId, name, slug, summary, installProtected, commentsEnabled, versions]
      properties:
        id:
          type: integer
        sourceId:
          type: integer
        sourceName:
          type: string
        packageId:
          type: string
          description: LPK package identity used to match installed apps and install history.
        name:
          type: string
        nameI18n:
          $ref: "#/components/schemas/LocalizedText"
        slug:
          type: string
        summary:
          type: string
        summaryI18n:
          $ref: "#/components/schemas/LocalizedText"
        descriptionI18n:
          $ref: "#/components/schemas/LocalizedText"
        category:
          type: string
        categoryI18n:
          $ref: "#/components/schemas/LocalizedText"
        iconUrl:
          type: string
          format: uri
        installProtected:
          type: boolean
        commentsEnabled:
          type: boolean
          description: Whether the cached source app currently accepts new comments.
        outdatedMarks:
          type: integer
          description: Number of update requests reported by the source feed.
        latestVersion:
          $ref: "#/components/schemas/ClientVersion"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/ClientVersion"

    ClientSyncAllResult:
      type: object
      required: [success, failed]
      properties:
        success:
          type: integer
        failed:
          type: integer

    InstalledApplication:
      type: object
      required: [appid]
      properties:
        appid:
          type: string
          description: Package ID reported by the app runtime.
        title:
          type: string
        version:
          type: string
        status:
          type: string
        instanceStatus:
          type: string
        icon:
          type: string

    ClientInstallRequest:
      type: object
      required: [appId]
      properties:
        appId:
          type: integer
          description: Cached client source app ID.
        version:
          type: string
          description: Optional target version. Omit to install the latest synced version.
        installPassword:
          type: string
        name:
          type: string
          deprecated: true
          description: Ignored by normal client installs; the server derives install metadata from the cached source app.
        pkgId:
          type: string
          deprecated: true
        downloadUrl:
          type: string
          deprecated: true
        sha256:
          type: string
          deprecated: true

    ClientInstallResult:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
        taskId:
          type: string
        status:
          type: string
        detail:
          type: string

    InstallHistoryEntry:
      type: object
      required: [id, packageId, appName, result, createdAt]
      properties:
        id:
          type: integer
        sourceId:
          type: integer
          nullable: true
        sourceAppId:
          type: integer
          nullable: true
        sourceName:
          type: string
        packageId:
          type: string
        appName:
          type: string
        version:
          type: string
        result:
          type: string
          enum: [SUCCESS, FAILED]
        downloadUrl:
          type: string
        sha256:
          type: string
        error:
          type: string
        createdAt:
          type: string
          format: date-time

    SetupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        sourcePasswordEnabled:
          type: boolean
        sourcePassword:
          type: string
          description: Source feed access password when sourcePasswordEnabled is true.
        githubDownloadMirrors:
          type: string
          description: Optional Release/Code(ZIP) GitHub mirrors, one name=>url entry per line.
        githubRawMirrors:
          type: string
          description: Optional raw.githubusercontent.com mirrors, one name=>url entry per line.
        requireEmailVerify:
          type: boolean

    APIToken:
      type: object
      required: [id, user_id, name, prefix]
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        prefix:
          type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    AppStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, UNLISTED]

    VersionStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    SourceType:
      type: string
      enum: [LOCAL, WEBDAV, S3, GITHUB]

    AppSummary:
      type: object
      required: [id, ownerId, owner, packageId, name, slug, status, allowUnreviewedUpdates, commentsEnabled, commentsAllowed, installProtected, downloadCount, tags, visibleGroupIds, appFavorited, submitterFavorited, createdAt, updatedAt]
      properties:
        id:
          type: integer
        ownerId:
          type: integer
        owner:
          type: string
        categoryId:
          type: integer
          nullable: true
        category:
          type: string
        categoryI18n:
          $ref: "#/components/schemas/LocalizedText"
        packageId:
          type: string
          description: LPK package identity from V2 package.yml package. This is the stable install identity; slug is only the storefront route/display identifier.
        name:
          type: string
        nameI18n:
          $ref: "#/components/schemas/LocalizedText"
        slug:
          type: string
        summary:
          type: string
        summaryI18n:
          $ref: "#/components/schemas/LocalizedText"
        description:
          type: string
        descriptionI18n:
          $ref: "#/components/schemas/LocalizedText"
        iconUrl:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/AppStatus"
        allowUnreviewedUpdates:
          type: boolean
        commentsEnabled:
          type: boolean
          description: Per-app comment setting configured by the app maintainer.
        commentsAllowed:
          type: boolean
          description: Effective comment permission after applying site-wide and per-app settings.
        installProtected:
          type: boolean
          description: True when this app requires a per-app install password. The password hash is never returned.
        downloadCount:
          type: integer
        tags:
          type: array
          items:
            type: string
        visibleGroupIds:
          type: array
          items:
            type: integer
        appFavorited:
          type: boolean
          description: Whether the current authenticated user has favorited this app.
        submitterFavorited:
          type: boolean
          description: Whether the current authenticated user has favorited this app submitter.
        latestVersion:
          $ref: "#/components/schemas/Version"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppDetail:
      allOf:
        - $ref: "#/components/schemas/AppSummary"
        - type: object
          properties:
            versions:
              type: array
              items:
                $ref: "#/components/schemas/Version"
            screenshots:
              type: array
              items:
                $ref: "#/components/schemas/Screenshot"
            comments:
              type: array
              items:
                $ref: "#/components/schemas/Comment"
            favorites:
              type: integer
            outdatedMarks:
              type: integer
            outdatedMarked:
              type: boolean
            canManageApp:
              type: boolean
            canUploadVersion:
              type: boolean
            canClearOutdatedMarks:
              type: boolean

    Version:
      type: object
      required: [id, appId, uploaderId, version, status, sourceType, downloadUrl, fileSize, sha256, createdAt]
      properties:
        id:
          type: integer
        appId:
          type: integer
        uploaderId:
          type: integer
        version:
          type: string
        changelog:
          type: string
        status:
          $ref: "#/components/schemas/VersionStatus"
        sourceType:
          $ref: "#/components/schemas/SourceType"
        downloadUrl:
          type: string
        upstreamDownloadUrl:
          type: string
          description: Original upstream LPK URL exposed by source feeds so clients can apply per-source mirrors.
        storagePath:
          type: string
        fileSize:
          type: integer
          format: int64
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Screenshot:
      type: object
      properties:
        id:
          type: integer
        appId:
          type: integer
        imageUrl:
          type: string
        caption:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    Comment:
