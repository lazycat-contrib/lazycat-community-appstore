        "200":
          description: Cached source apps.
          content:
            application/json:
              schema:
                type: object
                required: [apps]
                properties:
                  apps:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientSourceApp"

  /api/client/v1/apps/{id}:
    get:
      tags: [Client]
      summary: Get one cached client source app
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Cached source app.
          content:
