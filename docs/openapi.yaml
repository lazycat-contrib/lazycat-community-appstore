      tags: [Client]
      summary: Proxy a client update request to the app source server
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutdatedMarkRequest"
      responses:
        "200":
          description: Existing outdated mark updated by the source server.
        "201":
          description: Outdated mark created by the source server.
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Client]
      summary: Proxy clearing the current client's outdated mark to the source server
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Outdated mark cleared by the source server.
        "403":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /api/client/v1/installed:
    get:
      tags: [Client]
      summary: Query apps installed on the current app device
      description: This endpoint is local to the standalone client. The server storefront never receives or stores this device inventory.
      security: []
      responses:
        "200":
          description: Installed applications.
          content:
            application/json:
              schema:
                type: object
                required: [apps]
                properties:
                  apps:
                    type: array
                    items:
                      $ref: "#/components/schemas/InstalledApplication"
