          $ref: "#/components/schemas/VersionCleanupWarning"

    Version:
      type: object
      required: [id, appId, uploaderId, version, status, sourceType, downloadUrl, fileSize, sha256, createdAt]
      properties:
        id:
          type: integer
        appId:
          type: integer
        uploaderId:
          type: integer
        version:
          type: string
        changelog:
          type: string
        status:
          $ref: "#/components/schemas/VersionStatus"
        sourceType:
          $ref: "#/components/schemas/SourceType"
        downloadUrl:
          type: string
        upstreamDownloadUrl:
          type: string
          description: Original upstream LPK URL exposed by source feeds so clients can apply per-source mirrors.
        storageKey:
          type: string
        storagePath:
          type: string
        fileSize:
          type: integer
          format: int64
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Screenshot:
      type: object
      properties:
        id:
          type: integer
        appId:
          type: integer
        imageUrl:
          type: string
        caption:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
        appId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time

    OutdatedMarkRequest:
      type: object
      required: [note]
      properties:
        note:
          type: string
          minLength: 1
          maxLength: 1000
          description: Required user-provided reason explaining why the app needs an update.
        installedVersion:
          type: string
          maxLength: 80
          description: Optional currently installed or source version observed by the client.
        expectedVersion:
          type: string
          maxLength: 80
          description: Optional newer version, upstream release, or source reference.

    Review:
      type: object
      properties:
        id:
          type: integer
        kind:
          type: string
          enum: [APP_SUBMISSION, VERSION_UPLOAD, APP_INFO_UPDATE]
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        appId:
          type: integer
          nullable: true
        versionId:
          type: integer
          nullable: true
        requesterId:
          type: integer
        reviewerId:
          type: integer
          nullable: true
        note:
          type: string
        reviewNote:
          type: string
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    CollaboratorRequest:
      type: object
      properties:
        id:
          type: integer
        appId:
          type: integer
        userId:
          type: integer
        user_id:
          type: integer
          description: Backward-compatible snake_case requester ID.
        username:
          type: string
        email:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAppRequest:
      type: object
      description: Submit app metadata and optionally create the first version from an external LPK URL. For reachable V2 LPK URLs, the server can read package.yml and fill missing packageId, name, summary, description, version, file size, and sha256. Explicit JSON fields override LPK metadata.
      properties:
        packageId:
          type: string
          description: Required when no V2 LPK metadata is supplied by downloadUrl. Must match package.yml package when metadata is available.
        name:
          type: string
        slug:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
        allowUnreviewedUpdates:
          type: boolean
        commentsEnabled:
          type: boolean
        installPassword:
          type: string
          minLength: 4
          maxLength: 256
          description: Optional per-app install password. Stored as a hash; never returned.
        version:
          type: string
        changelog:
          type: string
        sourceType:
          $ref: "#/components/schemas/SourceType"
        downloadUrl:
          type: string
          format: uri
          description: External LPK URL. When metadata fields are missing, the server fetches this URL to parse a V2 LPK and compute SHA256.
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: External-package checksum normally supplied by CI/CD. When both version and sha256 are present, the server validates the checksum format but does not fetch or recompute the package. If version or sha256 is missing, the server may inspect downloadUrl and fill missing values; an explicitly supplied checksum is not replaced or compared.

    CreateAppMultipart:
      type: object
      description: Submit app metadata and optionally upload the first V2 LPK file. The server reads package.yml from the LPK and fills missing packageId, name, summary, description, and version. Explicit form fields override LPK metadata.
      properties:
        packageId:
          type: string
          description: Required when no file metadata is supplied. Must match package.yml package when a file is uploaded.
        name:
          type: string
        slug:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        tags:
          type: string
          description: Comma-separated tags.
        allowUnreviewedUpdates:
          type: boolean
        installPassword:
          type: string
          minLength: 4
          maxLength: 256
          description: Optional per-app install password. Stored as a hash; never returned.
        version:
          type: string
        changelog:
          type: string
        file:
          type: string
          format: binary

    UpdateAppRequest:
      type: object
      properties:
        name:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
        allowUnreviewedUpdates:
          type: boolean
        commentsEnabled:
          type: boolean
        installPassword:
          type: string
          minLength: 4
          maxLength: 256
          description: When present, a non-empty value replaces the install password and an empty value clears it.

    CreateVersionRequest:
      type: object
      required: [downloadUrl]
      description: Link a new external version. CI/CD should normally submit version, sha256, and downloadUrl together; in that case the server does not download the package. If version or sha256 is omitted, the server fetches downloadUrl, parses V2 package.yml, verifies packageId matches the app, records file size, and computes SHA256 for missing data. An explicitly supplied checksum is format-validated but not compared with the inspected package.
      properties:
        version:
          type: string
        changelog:
          type: string
        sourceType:
          $ref: "#/components/schemas/SourceType"
        downloadUrl:
          type: string
          format: uri
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: External-package checksum supplied by CI/CD or the publisher. Optional only when downloadUrl can be inspected as a valid V2 LPK. When supplied together with version, it is not recomputed by the server.

    CreateVersionMultipart:
      type: object
      required: [file]
      description: Upload a new V2 LPK version. The server always computes SHA256 from the uploaded bytes. If version is omitted, the server reads it from package.yml and verifies package.yml package matches the app packageId.
      properties:
        version:
          type: string
        changelog:
          type: string
        file:
          type: string
          format: binary

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string

    FavoriteData:
      type: object
      properties:
        apps:
          type: array
          items:
            $ref: "#/components/schemas/AppSummary"
        submitters:
          type: array
          items:
            $ref: "#/components/schemas/User"
