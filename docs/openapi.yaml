          type: string
          format: date-time

    CollaboratorRequest:
      type: object
      properties:
        id:
          type: integer
        appId:
          type: integer
        userId:
          type: integer
        user_id:
          type: integer
          description: Backward-compatible snake_case requester ID.
        username:
          type: string
        email:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAppRequest:
      type: object
      description: Submit app metadata and optionally create the first version from an external LPK URL. For reachable V2 LPK URLs, the server can read package.yml and fill missing packageId, name, summary, description, version, file size, and sha256. Explicit JSON fields override LPK metadata.
      properties:
        packageId:
          type: string
          description: Required when no V2 LPK metadata is supplied by downloadUrl. Must match package.yml package when metadata is available.
        name:
          type: string
        slug:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
        allowUnreviewedUpdates:
          type: boolean
        commentsEnabled:
          type: boolean
        installPassword:
          type: string
          minLength: 4
          maxLength: 256
          description: Optional per-app install password. Stored as a hash; never returned.
        version:
          type: string
        changelog:
          type: string
        sourceType:
          $ref: "#/components/schemas/SourceType"
        downloadUrl:
          type: string
          format: uri
          description: External LPK URL. When metadata fields are missing, the server fetches this URL to parse a V2 LPK and compute SHA256.
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: Optional when downloadUrl is reachable and points to a valid V2 LPK; otherwise required for external versions.

    CreateAppMultipart:
      type: object
      description: Submit app metadata and optionally upload the first V2 LPK file. The server reads package.yml from the LPK and fills missing packageId, name, summary, description, and version. Explicit form fields override LPK metadata.
      properties:
        packageId:
          type: string
          description: Required when no file metadata is supplied. Must match package.yml package when a file is uploaded.
        name:
          type: string
        slug:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        tags:
          type: string
          description: Comma-separated tags.
        allowUnreviewedUpdates:
          type: boolean
        installPassword:
          type: string
          minLength: 4
          maxLength: 256
          description: Optional per-app install password. Stored as a hash; never returned.
        version:
          type: string
        changelog:
          type: string
        file:
          type: string
          format: binary

    UpdateAppRequest:
      type: object
      properties:
        name:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
        allowUnreviewedUpdates:
          type: boolean
        commentsEnabled:
          type: boolean
        installPassword:
          type: string
          minLength: 4
          maxLength: 256
          description: When present, a non-empty value replaces the install password and an empty value clears it.

    CreateVersionRequest:
      type: object
      required: [downloadUrl]
      description: Link a new external version. If version or sha256 is omitted, the server fetches downloadUrl, parses V2 package.yml, verifies packageId matches the app, records file size, and computes SHA256. If the URL cannot be inspected, version and sha256 must be supplied.
      properties:
        version:
          type: string
        changelog:
          type: string
        sourceType:
          $ref: "#/components/schemas/SourceType"
        downloadUrl:
          type: string
          format: uri
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: Optional when downloadUrl can be inspected as a valid V2 LPK.

    CreateVersionMultipart:
      type: object
      required: [file]
      description: Upload a new V2 LPK version. If version is omitted, the server reads it from package.yml and verifies package.yml package matches the app packageId.
      properties:
        version:
          type: string
        changelog:
          type: string
        file:
          type: string
          format: binary

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string

    FavoriteData:
      type: object
      properties:
        apps:
          type: array
          items:
            $ref: "#/components/schemas/AppSummary"
        submitters:
          type: array
          items:
            $ref: "#/components/schemas/User"
