  /api/client/v1/install:
    post:
      tags: [Client]
      summary: Install a cached source app through the system Go SDK
      description: If version is omitted, the latest source version is installed. Supplying version lets the client install an older synced version for rollback.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInstallRequest"
      responses:
        "200":
          description: Install task result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientInstallResult"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /api/client/v1/history:
    get:
      tags: [Client]
      summary: List install attempts recorded by the standalone client
      security: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Install history entries.
          content:
            application/json:
              schema:
                type: object
                required: [history]
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/InstallHistoryEntry"
        "400":
          $ref: "#/components/responses/Error"

  /source/v1/index.json:
    get:
      tags: [Source]
      summary: Public software source feed
      security: []
      parameters:
        - name: password
          in: query
          required: false
          schema:
            type: string
        - name: X-Source-Password
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Source index with public approved apps and site metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceIndex"
        "401":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: lazycat_store_session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
    IDOrSlug:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    Error:
      description: Structured API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  requestBodies:
    TaxonomyBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
              slug:
                type: string
              description:
                type: string
              parentId:
                type: integer
                nullable: true
              sortOrder:
                type: integer
    CollectionBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
              slug:
                type: string
              description:
                type: string
              kind:
                type: string
                enum: [MANUAL, RECENT_UPDATED, MOST_DOWNLOADED]
              appIds:
                type: array
                items:
                  type: integer

  schemas:
    LocalizedText:
      type: object
      additionalProperties:
        type: string
      description: Locale keyed text map, for example zh, zh-CN, zh_Hans, or en.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
            details:
              nullable: true

    RuntimeCapabilities:
      type: object
      additionalProperties: false
      required: [lazycatInstall]
      properties:
        lazycatInstall:
          type: boolean

    LazyCatInstallRequest:
      type: object
      additionalProperties: false
      properties:
        installPassword:
          type: string
          maxLength: 256
          description: Required only when the selected app is protected by an installation password.

    LazyCatInstallResult:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          type: string
          enum: [lazycat-go-sdk]
        taskId:
          type: string
        status:
          type: string
        detail:
          type: string

    UserRole:
      type: string
      enum: [USER, SOFTWARE_ADMIN, SITE_ADMIN]

    User:
      type: object
      required: [id, username, role, emailVerified, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        inviteCode:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    SetupStatus:
      type: object
      required: [needsSetup]
      properties:
        needsSetup:
          type: boolean

    SiteAnnouncement:
      type: object
      required: [enabled, level]
      properties:
        enabled:
          type: boolean
        level:
          type: string
          enum: [info, warning, success]
        title:
          type: string
        body:
          type: string
        linkLabel:
          type: string
        linkUrl:
          type: string
          format: uri
        updatedAt:
          type: string
          format: date-time

    SiteRegistration:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [open, invite, closed]

    SiteProfile:
      type: object
      required: [title, publicUrl, sourceUrl, announcement, registration]
      properties:
        title:
          type: string
        iconUrl:
          type: string
          format: uri
        publicUrl:
          type: string
          format: uri
        sourceUrl:
          type: string
          format: uri
        announcement:
          $ref: "#/components/schemas/SiteAnnouncement"
        registration:
          $ref: "#/components/schemas/SiteRegistration"

    SiteSettings:
      type: object
      additionalProperties:
        type: string
      description: Site admin settings keyed by server setting names such as site_title, site_public_url, registration_mode, comments_enabled, allow_manual_outdated_clear, source_password, github_download_mirrors, github_raw_mirrors, announcement_enabled, and max_lpk_size.

    CreateRegistrationInviteRequest:
      type: object
      properties:
        note:
          type: string
          maxLength: 160
        maxUses:
          type: integer
          minimum: 1
          maximum: 10000
          default: 1

    RegistrationInvite:
      type: object
      required: [id, codePrefix, note, maxUses, remainingUses, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: integer
        codePrefix:
          type: string
        note:
          type: string
        maxUses:
          type: integer
        remainingUses:
          type: integer
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SourceIndex:
      type: object
      required: [schema, baseUrl, generatedAt, site, announcement, apps]
      properties:
        schema:
          type: string
          example: lazycat.appstore.source.v1
        baseUrl:
          type: string
          format: uri
        generatedAt:
          type: string
          format: date-time
        site:
          $ref: "#/components/schemas/SourceSite"
        announcement:
          $ref: "#/components/schemas/SiteAnnouncement"
        apps:
          type: array
          items:
            $ref: "#/components/schemas/SourceApp"

    SourceApp:
      type: object
      required: [id, packageId, name, slug, summary, description, installProtected, commentsEnabled, updatedAt, latestVersion, versions]
      properties:
        id:
          type: integer
        packageId:
          type: string
          description: LPK package identity from V2 package.yml package.
        name:
          type: string
        nameI18n:
          $ref: "#/components/schemas/LocalizedText"
        slug:
          type: string
        summary:
          type: string
        summaryI18n:
          $ref: "#/components/schemas/LocalizedText"
        description:
          type: string
        descriptionI18n:
          $ref: "#/components/schemas/LocalizedText"
        author:
          type: string
          description: Software author declared by the LPK package metadata.
        homepage:
          type: string
          description: Software homepage declared by the LPK package metadata.
        license:
          type: string
          description: Software license declared by the LPK package metadata.
        minOSVersion:
          type: string
          description: Informational minimum LazyCat OS version declared by the LPK.
        iconUrl:
          type: string
          format: uri
        category:
          type: string
        categoryI18n:
          $ref: "#/components/schemas/LocalizedText"
        tags:
          type: array
          items:
            type: string
        submitter:
          type: string
        installProtected:
          type: boolean
        commentsEnabled:
          type: boolean
          description: Effective source comment permission after applying site-wide and per-app comment settings.
        outdatedMarks:
          type: integer
          description: Number of client update requests currently open for this app. Publishing a new version clears the count.
        updatedAt:
          type: string
          format: date-time
        latestVersion:
          $ref: "#/components/schemas/SourceVersion"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/SourceVersion"

    SourceSite:
      type: object
      required: [title, publicUrl, sourceUrl]
      properties:
        title:
          type: string
        iconUrl:
          type: string
          format: uri
        publicUrl:
          type: string
          format: uri
        sourceUrl:
          type: string
          format: uri

    SourceVersion:
      type: object
      required: [version, downloadUrl, sha256, size, publishedAt]
      properties:
        version:
          type: string
        changelog:
          type: string
        sourceType:
          type: string
        downloadUrl:
          type: string
          format: uri
        upstreamDownloadUrl:
          type: string
          format: uri
        sha256:
          type: string
        size:
          type: integer
          format: int64
        publishedAt:
          type: string
          format: date-time

