usage: |
  这是独立客户端，可在不部署服务端的情况下使用。
  打开应用后在“软件源”页面添加 /source/v2/index.json 地址并同步。

application:
  subdomain: lazycat-appstore
  background_task: true
  oidc_redirect_path: /auth/oidc/callback
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://127.0.0.1:8090/
      backend_launch_command: /lzcapp/pkg/content/store-client
  environment:
    - CLIENT_ADDR=127.0.0.1:8090
    - CLIENT_DB_DSN=/lzcapp/var/data/client.db
    - CLIENT_SESSION_SECRET={{ stable_secret "client_session_secret_v1" }}
    - CLIENT_OIDC_ENABLED=true
    - CLIENT_OIDC_ISSUER_URL=${LAZYCAT_AUTH_OIDC_ISSUER_URI}
    - CLIENT_OIDC_CLIENT_ID=${LAZYCAT_AUTH_OIDC_CLIENT_ID}
    - CLIENT_OIDC_CLIENT_SECRET=${LAZYCAT_AUTH_OIDC_CLIENT_SECRET}
    - CLIENT_OIDC_REDIRECT_URL=https://${LAZYCAT_APP_DOMAIN}/auth/oidc/callback
  health_check:
    test_url: http://127.0.0.1:8090/healthz
    start_period: 10s
    timeout: 5s
  injects:
    - id: open-save-chooser
      on: browser
      when:
        - /*
      do:
        - src: file:///lzcapp/pkg/content/lazycat-injects/lzc-file-chooser-inject.js
