usage: |
  这是独立客户端，可在不部署服务端的情况下使用。
  打开应用后在“软件源”页面添加 /source/v1/index.json 地址并同步。

application:
  subdomain: lazycat-appstore
  public_path:
    - /
  upstreams:
    - location: /
      backend: file:///lzcapp/pkg/content/dist/
  injects:
    - id: open-save-chooser
      on: browser
      when:
        - /*
      do:
        - src: file:///lzcapp/pkg/content/lazycat-injects/lzc-file-chooser-inject.js
