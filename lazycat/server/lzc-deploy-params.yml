params:
  - id: admin_username
    type: string
    name: "Admin Username"
    description: "Initial site administrator username"
    default_value: "admin"
    optional: false
  - id: admin_password
    type: secret
    name: "Admin Password"
    description: "Initial site administrator password"
    default_value: "$random(len=20)"
    optional: false
  - id: source_password
    type: secret
    name: "Source Password"
    description: "Optional password for /source/v2/index.json"
    optional: true
  - id: source_v1_enabled
    type: bool
    name: "Enable v1 Compatibility Feed"
    description: "Keep /source/v1/index.json available for older clients"
    default_value: "true"
    optional: false
  - id: trust_lazycat_client_chat
    type: bool
    name: "Trust App Store Client Chat"
    description: "Allow the standalone app store client app to proxy private message requests to this server"
    default_value: "true"
    optional: false
  - id: db_driver
    type: string
    name: "Database Driver"
    description: "Database driver: sqlite3, postgres, or mysql"
    default_value: "sqlite3"
    optional: false
  - id: db_dsn
    type: string
    name: "Database DSN"
    description: "Database connection string. The default sqlite3 DSN uses entsqlite recommended WAL settings."
    default_value: "file:/lzcapp/var/data/store.db?cache=shared&_pragma=foreign_keys(1)&_pragma=journal_mode(WAL)&_pragma=synchronous(NORMAL)&_pragma=busy_timeout(10000)"
    optional: false
  - id: github_download_mirrors
    type: string
    name: "GitHub Download Mirrors"
    description: "Optional GitHub Release/Code ZIP mirrors, one per line as name=>url"
    optional: true
  - id: github_raw_mirrors
    type: string
    name: "GitHub Raw Mirrors"
    description: "Optional GitHub raw.githubusercontent.com mirrors, one per line as name=>url"
    optional: true

locales:
  zh:
    admin_username:
      name: "管理员用户名"
      description: "初始站点管理员用户名"
    admin_password:
      name: "管理员密码"
      description: "初始站点管理员密码"
    source_password:
      name: "软件源密码"
      description: "可选的 /source/v2/index.json 访问密码"
    source_v1_enabled:
      name: "启用 v1 兼容源"
      description: "保留 /source/v1/index.json 以兼容旧客户端"
    trust_lazycat_client_chat:
      name: "信任客户端私信代理"
      description: "允许独立客户端应用将私信请求代理到当前服务端"
    db_driver:
      name: "数据库类型"
      description: "数据库驱动：sqlite3、postgres 或 mysql"
    db_dsn:
      name: "数据库连接字符串"
      description: "数据库连接字符串。默认 sqlite3 使用 entsqlite 推荐的 WAL 配置。"
    github_download_mirrors:
      name: "GitHub 下载镜像"
      description: "可选的 GitHub Release/Code ZIP 下载镜像，一行一个，格式：名称=>地址"
    github_raw_mirrors:
      name: "GitHub Raw 镜像"
      description: "可选的 raw.githubusercontent.com 加速源，一行一个，格式：名称=>地址"
