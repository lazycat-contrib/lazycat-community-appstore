params:
  - id: admin_username
    type: string
    name: "Admin Username"
    description: "Initial site administrator username"
    default_value: "admin"
    optional: false
  - id: admin_password
    type: secret
    name: "Admin Password"
    description: "Initial site administrator password"
    default_value: "$random(len=20)"
    optional: false
  - id: source_password
    type: secret
    name: "Source Password"
    description: "Optional password for /source/v1/index.json"
    optional: true
  - id: github_download_mirrors
    type: string
    name: "GitHub Download Mirrors"
    description: "Optional GitHub Release/Code ZIP mirrors, one per line as name=>url"
    optional: true
  - id: github_raw_mirrors
    type: string
    name: "GitHub Raw Mirrors"
    description: "Optional GitHub raw.githubusercontent.com mirrors, one per line as name=>url"
    optional: true

locales:
  zh:
    admin_username:
      name: "管理员用户名"
      description: "初始站点管理员用户名"
    admin_password:
      name: "管理员密码"
      description: "初始站点管理员密码"
    source_password:
      name: "软件源密码"
      description: "可选的 /source/v1/index.json 访问密码"
    github_download_mirrors:
      name: "GitHub 下载镜像"
      description: "可选的 GitHub Release/Code ZIP 下载镜像，一行一个，格式：名称=>地址"
    github_raw_mirrors:
      name: "GitHub Raw 镜像"
      description: "可选的 raw.githubusercontent.com 加速源，一行一个，格式：名称=>地址"
